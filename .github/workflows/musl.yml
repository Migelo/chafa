name: Build static musl binary

# Produces a single fully-static x86_64 chafa ELF (linked against musl libc) with no
# dynamic dependencies, runnable on old machines regardless of the host's glibc.
# On every run the binary is uploaded as a workflow artifact; on a v* tag push it is
# also attached to the GitHub release for that tag.

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write   # softprops/action-gh-release needs this to upload release assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            musl-tools meson ninja-build cmake pkg-config \
            autoconf automake libtool curl ca-certificates

      # The dependency prefix is idempotent (build-musl.sh skips any dep whose .a/.pc
      # already exists), so cache it keyed on the script to skip the ~6 min rebuild on
      # unchanged builds. Exact key only: any script edit forces a clean rebuild.
      - name: Cache musl dependency prefix
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/chafa-musl-prefix
          key: musl-deps-${{ hashFiles('build-musl.sh') }}

      - name: Build static musl chafa
        run: |
          export PREFIX="${{ runner.temp }}/chafa-musl-prefix"
          export SRC="${{ runner.temp }}/chafa-musl-src"
          ./build-musl.sh

      - name: Verify static binary
        run: |
          file chafa-musl-static
          if readelf -d chafa-musl-static | grep -q 'NEEDED'; then
            echo "::error::binary has dynamic dependencies"
            exit 1
          fi
          ./chafa-musl-static --version
          ./chafa-musl-static --size 50x10 tests/data/good/card-full-noalpha.png >/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: chafa-musl-static
          path: chafa-musl-static
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: chafa-musl-static
